<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Google Sheets CSV</title>
  <style>
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
}

th {
  background: #f5f5f5;
  position: sticky;
  top: 0;
}

td:first-child,
th:first-child {
  text-align: left;
  font-weight: bold;
}
  </style>
</head>
<body>
<div id="palpites"></div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
Papa.parse("https://docs.google.com/spreadsheets/d/e/2PACX-1vSTddx-sssAtmbLlw_2vgu1lKW1XAc_esekjhaIG_y1BcXdSKzMq_zZCt8TIcbSVL2o9ZP3egdt4zOA/pub?gid=0&single=true&output=csv", {
    download: true,
    header: true,
    complete: function(results) {

        const dados = results.data.filter(r => r.Participante);

        const participantes = [...new Set(
            dados.map(r => r.Participante)
        )].sort((a,b) => a.localeCompare(b));

        const container = document.getElementById("palpites");

        participantes.forEach(nome => {

            const apostas = dados.filter(
                r => r.Participante === nome
            );

            let html = `
                <h2>${nome}</h2>
                <table border="1" cellspacing="0" cellpadding="5">
                    <tr>
                        <th>Jogo</th>
                        <th>Palpite</th>
                    </tr>
            `;

            apostas.forEach(a => {
                html += `
                    <tr>
                        <td>${a.Jogo}</td>
                        <td>${a["resultado time 1"]} x ${a["resultado time 2"]}</td>
                        <td>${a["Vencedor Pênaltis"]}</td>
                    </tr>
                `;
            });

            html += "</table><br>";

            container.innerHTML += html;
        });

    }
});
</script>

</body>
</html>
