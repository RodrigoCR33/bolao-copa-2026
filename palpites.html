<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Google Sheets CSV</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    th {
      background: #f0f0f0;
    }
  </style>
</head>
<body>

  <table id="tabela"></table>

  <script>
    const csvUrl =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vSTddx-sssAtmbLlw_2vgu1lKW1XAc_esekjhaIG_y1BcXdSKzMq_zZCt8TIcbSVL2o9ZP3egdt4zOA/pub?gid=0&single=true&output=csv";

    fetch(csvUrl)
      .then(response => response.text())
      .then(csv => {
        const linhas = csv.trim().split("\n");
        const tabela = document.getElementById("tabela");

        linhas.forEach((linha, index) => {
          const tr = document.createElement("tr");

          linha.split(",").forEach(celula => {
            const el = document.createElement(
              index === 0 ? "th" : "td"
            );

            el.textContent = celula;
            tr.appendChild(el);
          });

          tabela.appendChild(tr);
        });
      });
  </script>
  

</body>
</html>
