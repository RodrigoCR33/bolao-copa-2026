<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Google Sheets CSV</title>
  <style>
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
}

th {
  background: #f5f5f5;
  position: sticky;
  top: 0;
}

td:first-child,
th:first-child {
  text-align: left;
  font-weight: bold;
}
  </style>
</head>
<body>

  <table id="tabela"></table>

<table id="tabela"></table>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<table id="tabela"></table>

<script>
Papa.parse("SUA_URL_CSV", {
  download: true,
  header: true,
  complete: function(results) {

    const dados = results.data.filter(r => r.Participante);

    const participantes = [...new Set(
      dados.map(r => r.Participante)
    )].sort((a, b) => a.localeCompare(b));

    const jogos = [...new Set(
      dados.map(r => r.Jogo)
    )];

    const matriz = {};

    dados.forEach(r => {
      const jogo = r.Jogo;
      const participante = r.Participante;

      if (!matriz[jogo]) {
        matriz[jogo] = {};
      }

      matriz[jogo][participante] =
        `${r["resultado time 1"]} x ${r["resultado time 2"]}`;
    });

    const tabela = document.getElementById("tabela");

    let html = "<thead><tr><th>Jogo</th>";

    participantes.forEach(p => {
      html += `<th>${p}</th>`;
    });

    html += "</tr></thead><tbody>";

    jogos.forEach(jogo => {
      html += `<tr><td>${jogo}</td>`;

      participantes.forEach(participante => {
        html += `<td>${matriz[jogo]?.[participante] || ""}</td>`;
      });

      html += "</tr>";
    });

    html += "</tbody>";

    tabela.innerHTML = html;
  }
});
</script>

</body>
</html>
