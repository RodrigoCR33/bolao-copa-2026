<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Google Sheets CSV</title>
  <style>
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
}

th {
  background: #f5f5f5;
  position: sticky;
  top: 0;
}

td:first-child,
th:first-child {
  text-align: left;
  font-weight: bold;
}
  </style>
</head>
<body>

  <table id="tabela"></table>

<table id="tabela"></table>

<script>
fetch("SEU_CSV_URL")
  .then(r => r.text())
  .then(csv => {
    const linhas = csv.trim().split("\n");

    // Remove cabeçalho
    const dados = linhas.slice(1).map(linha => linha.split("\t"));

    const participantes = [...new Set(
      dados.map(row => row[1])
    )].sort();

    const jogos = [...new Set(
      dados.map(row => row[2])
    )];

    const palpites = {};

    dados.forEach(row => {
      const participante = row[1];
      const jogo = row[2];
      const placar = `${row[3]} x ${row[4]}`;

      if (!palpites[jogo]) {
        palpites[jogo] = {};
      }

      palpites[jogo][participante] = placar;
    });

    const tabela = document.getElementById("tabela");

    // Cabeçalho
    const thead = document.createElement("thead");
    const trHead = document.createElement("tr");

    trHead.innerHTML = `
      <th>Jogo</th>
      ${participantes.map(p => `<th>${p}</th>`).join("")}
    `;

    thead.appendChild(trHead);
    tabela.appendChild(thead);

    // Corpo
    const tbody = document.createElement("tbody");

    jogos.forEach(jogo => {
      const tr = document.createElement("tr");

      let html = `<td>${jogo}</td>`;

      participantes.forEach(participante => {
        html += `<td>${
          palpites[jogo][participante] || "-"
        }</td>`;
      });

      tr.innerHTML = html;
      tbody.appendChild(tr);
    });

    tabela.appendChild(tbody);
  });
</script>
  

</body>
</html>
